name: Build Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. 0.9.2)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-11-arm
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build protocol crate
        run: cargo build --release -p hmg-protocol --target ${{ matrix.target }}

      - name: Build certification crate
        run: cargo build --release -p hmg-certification --target ${{ matrix.target }}

      - name: Run tests
        run: cargo test -p hmg-protocol -p hmg-certification --target ${{ matrix.target }}

      # Windows uses .zip, others use .tar.gz
      # - name: Package binaries (Unix)
      #   if: runner.os != 'Windows'
      #   run: |
      #     mkdir -p hmg-${{ inputs.version }}-${{ matrix.target }}
      #     cp target/${{ matrix.target }}/release/hmg hmg-${{ inputs.version }}-${{ matrix.target }}/
      #     cp target/${{ matrix.target }}/release/hmg-server hmg-${{ inputs.version }}-${{ matrix.target }}/
      #     cp target/${{ matrix.target }}/release/hmg-hook-worker hmg-${{ inputs.version }}-${{ matrix.target }}/
      #     tar -czf hmg-${{ inputs.version }}-${{ matrix.target }}.tar.gz hmg-${{ inputs.version }}-${{ matrix.target }}
      #
      # - name: Package binaries (Windows)
      #   if: runner.os == 'Windows'
      #   run: |
      #     mkdir hmg-${{ inputs.version }}-${{ matrix.target }}
      #     cp target/${{ matrix.target }}/release/hmg.exe hmg-${{ inputs.version }}-${{ matrix.target }}/
      #     cp target/${{ matrix.target }}/release/hmg-server.exe hmg-${{ inputs.version }}-${{ matrix.target }}/
      #     cp target/${{ matrix.target }}/release/hmg-hook-worker.exe hmg-${{ inputs.version }}-${{ matrix.target }}/
      #     Compress-Archive -Path hmg-${{ inputs.version }}-${{ matrix.target }} -DestinationPath hmg-${{ inputs.version }}-${{ matrix.target }}.zip

      # NOTE: To build the actual hmg/hmg-server binaries, this workflow
      # needs to run from the private repository where the full engine
      # source code is available. Uncomment the steps below when running
      # from the private repo:
      #
      # - name: Build binaries
      #   run: cargo build --release -p hmg-server --target ${{ matrix.target }}
      #
      # - name: Package binaries
      #   run: |
      #     mkdir -p hmg-${{ inputs.version }}-${{ matrix.target }}
      #     cp target/${{ matrix.target }}/release/hmg hmg-${{ inputs.version }}-${{ matrix.target }}/
      #     cp target/${{ matrix.target }}/release/hmg-server hmg-${{ inputs.version }}-${{ matrix.target }}/
      #     cp target/${{ matrix.target }}/release/hmg-hook-worker hmg-${{ inputs.version }}-${{ matrix.target }}/
      #     tar -czf hmg-${{ inputs.version }}-${{ matrix.target }}.tar.gz hmg-${{ inputs.version }}-${{ matrix.target }}
      #
      # - name: Upload to release
      #   uses: softprops/action-gh-release@v2
      #   with:
      #     tag: v${{ inputs.version }}
      #     files: hmg-${{ inputs.version }}-${{ matrix.target }}.tar.gz

      - name: Verify protocol tests pass
        run: echo "✅ Protocol and certification tests pass on ${{ matrix.target }}"

  # This job runs in the PRIVATE repo to build and upload the actual binaries.
  # Copy this workflow to the private repo and uncomment the binary build steps.
  mirror-to-website:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/mirror
          gh release download v${{ inputs.version }} \
            --repo ${{ github.repository }} \
            --dir /tmp/mirror
      - name: Upload to website mirror
        # Deploy binaries to hmg1ai.com/releases/
        # Requires SSH key or API key for the web server
        run: |
          echo "TODO: rsync /tmp/mirror/*.tar.gz to hmg1ai.com:/opt/funcode/hmg-site/releases/"
          # rsync -avz /tmp/mirror/*.tar.gz deploy@hmg1ai.com:/opt/funcode/hmg-site/releases/latest/download/
