<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    // Redirect to site root for GitHub Pages SPA
    const path = window.location.pathname;
    if (path === '/' || path === '/HMG-public/' || path.endsWith('index.html')) {
      window.location.replace('site/');
    }
  </script>
</head>
<body>
  <p><a href="site/">Go to HMG</a></p>
</body>
</html>
