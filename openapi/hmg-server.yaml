openapi: 3.1.0
info:
  title: HMG Server API
  version: 0.1.0
  description: >
    Domain-pack aware HMG HTTP contract. All write, recall, and correction
    operations accept a unified MemoryContext plus an optional domain_pack_id.
servers:
  - url: http://localhost:8080
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
  parameters:
    TenantHeader:
      in: header
      name: x-hmg-tenant-id
      required: false
      schema:
        type: string
      description: Injects a tenant scope when the request body does not provide one.
    ActorIdHeader:
      in: header
      name: x-hmg-actor-id
      required: false
      schema:
        type: string
      description: Request actor identifier used for audit context injection.
    ActorKindHeader:
      in: header
      name: x-hmg-actor-kind
      required: false
      schema:
        type: string
        enum: [User, Agent, Service, user, agent, service]
      description: Request actor kind used for audit context injection.
    TraceIdHeader:
      in: header
      name: x-trace-id
      required: false
      schema:
        type: string
      description: Optional trace identifier propagated into request audit context.
    RoleHeader:
      in: header
      name: x-hmg-role
      required: false
      schema:
        type: string
        enum: [viewer, editor, governor, admin]
      description: Service-layer access role used for policy gating.
    PolicyTagsHeader:
      in: header
      name: x-hmg-policy-tags
      required: false
      schema:
        type: string
      description: Comma-separated policy tags granting read access to tagged records.
paths:
  /api/stats:
    get:
      summary: Read engine statistics
      operationId: getStats
      responses:
        "200":
          description: Current engine statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsEnvelopeResponse"
  /api/memorize:
    post:
      summary: Memorize new information
      operationId: memorize
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/ActorIdHeader"
        - $ref: "#/components/parameters/ActorKindHeader"
        - $ref: "#/components/parameters/TraceIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemorizeRequest"
      responses:
        "200":
          description: Memory written
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemorizeEnvelopeResponse"
  /api/observations/capture:
    post:
      summary: Capture a governed observation and optionally execute promotion
      operationId: observationCapture
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/ActorIdHeader"
        - $ref: "#/components/parameters/RoleHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ObservationCaptureRequest"
      responses:
        "200":
          description: Observation captured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ObservationCaptureEnvelopeResponse"
        "400":
          description: Invalid capture request or observation runtime unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ObservationCaptureEnvelopeResponse"
  /api/observations/promote/dry-run:
    post:
      summary: Build a promotion dry-run report for active observations
      operationId: observationPromoteDryRun
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/RoleHeader"
      responses:
        "200":
          description: Promotion dry-run report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ObservationPromoteDryRunEnvelopeResponse"
        "400":
          description: Observation runtime unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ObservationPromoteDryRunEnvelopeResponse"
  /api/observations/promote:
    post:
      summary: Execute an approved observation promotion plan
      operationId: observationPromote
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/RoleHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ObservationPromoteRequest"
      responses:
        "200":
          description: Promotion executed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ObservationPromoteEnvelopeResponse"
        "400":
          description: Invalid plan or dry-run promotion mode
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ObservationPromoteEnvelopeResponse"
  /api/observations/config:
    get:
      summary: Read effective observation capture and promotion configuration
      operationId: observationConfig
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/RoleHeader"
      responses:
        "200":
          description: Effective observation runtime configuration (merged precedence)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ObservationConfigEnvelopeResponse"
        "400":
          description: Observation runtime unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ObservationConfigEnvelopeResponse"
    put:
      summary: Persist observation capture/promotion settings to store-adjacent observation.toml
      operationId: observationConfigUpdate
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/RoleHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ObservationConfigUpdateRequest"
      responses:
        "200":
          description: Updated effective observation configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ObservationConfigEnvelopeResponse"
        "400":
          description: Invalid configuration payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ObservationConfigEnvelopeResponse"
        "403":
          description: Role not allowed to update observation configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ObservationConfigEnvelopeResponse"
  /api/observations/forget:
    post:
      summary: Tombstone scoped raw observations on explicit user forget
      operationId: observationForget
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/ActorIdHeader"
        - $ref: "#/components/parameters/RoleHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ObservationForgetRequest"
      responses:
        "200":
          description: Scoped forget completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ObservationForgetEnvelopeResponse"
        "400":
          description: Invalid forget request or observation runtime unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ObservationForgetEnvelopeResponse"
  /api/observations/maintain:
    post:
      summary: Run TTL expiry release and storage-pressure compaction
      operationId: observationMaintain
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/RoleHeader"
      responses:
        "200":
          description: Maintenance completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ObservationMaintainEnvelopeResponse"
        "400":
          description: Observation runtime unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ObservationMaintainEnvelopeResponse"
  /api/observations/review-queue:
    get:
      summary: List observations in the multilingual review queue
      operationId: observationReviewQueue
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/RoleHeader"
      responses:
        "200":
          description: Review queue snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ObservationReviewQueueEnvelopeResponse"
  /api/observations/review/resolve:
    post:
      summary: Operator resolve for a review-queue observation
      operationId: observationReviewResolve
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/RoleHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ObservationReviewResolveRequest"
      responses:
        "200":
          description: Review item resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ObservationReviewResolveEnvelopeResponse"
  /api/secrets/store:
    post:
      summary: Store credential in encrypted vault
      operationId: secretStore
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/ActorIdHeader"
        - $ref: "#/components/parameters/RoleHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SecretStoreRequest"
      responses:
        "200":
          description: Secret encrypted locally; only metadata is written to graph
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecretStoreEnvelopeResponse"
  /api/secrets/lookup:
    post:
      summary: Lookup credential metadata without returning payloads
      operationId: secretLookup
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SecretLookupRequest"
      responses:
        "200":
          description: Matching secret metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecretLookupEnvelopeResponse"
  /api/secrets/use:
    post:
      summary: Authorize server-side credential use without revealing payload
      operationId: secretUse
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SecretUseRequest"
      responses:
        "200":
          description: Server-side use session authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecretUseEnvelopeResponse"
  /api/secrets/reveal:
    post:
      summary: Reveal credential only when explicit policy allows it
      operationId: secretReveal
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SecretUseRequest"
      responses:
        "200":
          description: Secret payload revealed to caller under strong policy gate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecretRevealEnvelopeResponse"
  /api/secrets/rotate:
    post:
      summary: Rotate encrypted credential payload
      operationId: secretRotate
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SecretRotateRequest"
      responses:
        "200":
          description: Secret payload rotated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecretStoreEnvelopeResponse"
  /api/secrets/revoke:
    post:
      summary: Revoke credential so future use is denied
      operationId: secretRevoke
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SecretRevokeRequest"
      responses:
        "200":
          description: Secret revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecretRevokeEnvelopeResponse"
  /api/recall:
    post:
      summary: Recall relevant memories
      operationId: recall
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/ActorIdHeader"
        - $ref: "#/components/parameters/ActorKindHeader"
        - $ref: "#/components/parameters/TraceIdHeader"
        - $ref: "#/components/parameters/RoleHeader"
        - $ref: "#/components/parameters/PolicyTagsHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecallRequest"
      responses:
        "200":
          description: Recalled memories
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecallEnvelopeResponse"
  /api/recall_view:
    post:
      summary: Recall memories through normal, governance, or audit view
      operationId: recallView
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/ActorIdHeader"
        - $ref: "#/components/parameters/ActorKindHeader"
        - $ref: "#/components/parameters/TraceIdHeader"
        - $ref: "#/components/parameters/RoleHeader"
        - $ref: "#/components/parameters/PolicyTagsHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecallViewRequest"
      responses:
        "200":
          description: Recalled memories using a governance-aware view
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecallViewEnvelopeResponse"
  /api/memory/noise_feedback:
    post:
      summary: Register an embedding noise prototype phrase (Phase E)
      operationId: noiseFeedback
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/ActorIdHeader"
        - $ref: "#/components/parameters/ActorKindHeader"
        - $ref: "#/components/parameters/TraceIdHeader"
        - $ref: "#/components/parameters/RoleHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoiseFeedbackRequest"
      responses:
        "200":
          description: Prototype registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoiseFeedbackEnvelopeResponse"
  /api/correct:
    post:
      summary: Correct an existing memory
      operationId: correct
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/ActorIdHeader"
        - $ref: "#/components/parameters/ActorKindHeader"
        - $ref: "#/components/parameters/TraceIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CorrectRequest"
      responses:
        "200":
          description: Correction result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CorrectEnvelopeResponse"
  /api/verify:
    post:
      summary: Verify graph consistency
      operationId: verify
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
      responses:
        "200":
          description: Verification report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationEnvelopeResponse"
  /api/snapshot:
    post:
      summary: Create an explicit snapshot
      operationId: createSnapshot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SnapshotRequest"
      responses:
        "200":
          description: Snapshot created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnapshotEnvelopeResponse"
  /api/snapshots/{version}:
    get:
      summary: Read one snapshot delta
      operationId: getSnapshot
      parameters:
        - in: path
          name: version
          required: true
          schema:
            type: integer
            format: uint64
      responses:
        "200":
          description: Snapshot delta
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnapshotDeltaEnvelopeResponse"
        "404":
          description: Snapshot version not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnapshotDeltaEnvelopeResponse"
  /api/replay:
    get:
      summary: Replay snapshot deltas across a version range
      operationId: replay
      parameters:
        - in: query
          name: from_version
          required: true
          schema:
            type: integer
            format: uint64
        - in: query
          name: to_version
          required: true
          schema:
            type: integer
            format: uint64
      responses:
        "200":
          description: Snapshot replay for the requested range
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReplayEnvelopeResponse"
  /api/governance/quarantine:
    post:
      summary: Quarantine an atom from normal recall
      operationId: quarantineAtom
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/ActorIdHeader"
        - $ref: "#/components/parameters/ActorKindHeader"
        - $ref: "#/components/parameters/TraceIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GovernanceRequest"
      responses:
        "200":
          description: Atom quarantined
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceEnvelopeResponse"
  /api/governance/seal:
    post:
      summary: Seal an atom and optionally derive a lesson atom
      operationId: sealAtom
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/ActorIdHeader"
        - $ref: "#/components/parameters/ActorKindHeader"
        - $ref: "#/components/parameters/TraceIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GovernanceRequest"
      responses:
        "200":
          description: Atom sealed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceEnvelopeResponse"
  /api/governance/tombstone:
    post:
      summary: Tombstone an atom and optionally destroy payload recovery
      operationId: tombstoneAtom
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/ActorIdHeader"
        - $ref: "#/components/parameters/ActorKindHeader"
        - $ref: "#/components/parameters/TraceIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GovernanceRequest"
      responses:
        "200":
          description: Atom tombstoned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceEnvelopeResponse"
  /api/governance/derive_lesson:
    post:
      summary: Derive a sanitized lesson atom from an existing atom
      operationId: deriveLesson
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/ActorIdHeader"
        - $ref: "#/components/parameters/ActorKindHeader"
        - $ref: "#/components/parameters/TraceIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GovernanceRequest"
      responses:
        "200":
          description: Lesson atom derived
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceEnvelopeResponse"
  /api/audit/access:
    get:
      summary: Read recent access audit traces
      operationId: auditAccess
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/ActorIdHeader"
        - $ref: "#/components/parameters/ActorKindHeader"
        - $ref: "#/components/parameters/TraceIdHeader"
        - $ref: "#/components/parameters/RoleHeader"
      responses:
        "200":
          description: Recent access traces
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessTraceListEnvelopeResponse"
  /api/audit/verify:
    get:
      summary: Verify the access audit trace hash chain
      operationId: auditVerify
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/ActorIdHeader"
        - $ref: "#/components/parameters/ActorKindHeader"
        - $ref: "#/components/parameters/TraceIdHeader"
        - $ref: "#/components/parameters/RoleHeader"
      responses:
        "200":
          description: Audit hash chain verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessTraceVerificationEnvelopeResponse"
  /api/usage/report:
    get:
      summary: Read aggregated usage metering report
      operationId: usageReport
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/ActorIdHeader"
        - $ref: "#/components/parameters/ActorKindHeader"
        - $ref: "#/components/parameters/TraceIdHeader"
        - $ref: "#/components/parameters/RoleHeader"
        - in: query
          name: tenant_id
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Aggregated usage report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageReportEnvelopeResponse"
  /api/graph/export:
    get:
      summary: Export readable graph as visualization-friendly JSON
      operationId: graphExport
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/ActorIdHeader"
        - $ref: "#/components/parameters/ActorKindHeader"
        - $ref: "#/components/parameters/TraceIdHeader"
        - $ref: "#/components/parameters/RoleHeader"
        - $ref: "#/components/parameters/PolicyTagsHeader"
      responses:
        "200":
          description: Readable graph export
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphExportEnvelopeResponse"
  /api/atom/{id}:
    get:
      summary: Read one atom
      operationId: getAtom
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Atom
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AtomEnvelopeResponse"
        "400":
          description: Invalid atom id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AtomEnvelopeResponse"
        "403":
          description: Atom not readable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AtomEnvelopeResponse"
        "404":
          description: Atom not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AtomEnvelopeResponse"
  /api/atom/{id}/history:
    get:
      summary: Read one atom with state history
      operationId: getAtomHistory
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Atom history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AtomHistoryEnvelopeResponse"
        "400":
          description: Invalid atom id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AtomHistoryEnvelopeResponse"
        "403":
          description: Atom history not readable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AtomHistoryEnvelopeResponse"
        "404":
          description: Atom not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AtomHistoryEnvelopeResponse"
  /api/hooks/dispatch:
    post:
      summary: Dispatch a control-plane hook event
      operationId: hookDispatch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HookDispatchRequest"
      responses:
        "200":
          description: Hook dispatched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HookDispatchEnvelopeResponse"
        "400":
          description: Invalid hook event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HookDispatchEnvelopeResponse"
  /api/hooks/events:
    get:
      summary: Read recent hook events
      operationId: hookEvents
      responses:
        "200":
          description: Recent events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HookEventsEnvelopeResponse"
  /api/hooks/queue/stats:
    get:
      summary: Read hook queue status counts
      operationId: hookQueueStats
      responses:
        "200":
          description: Hook queue statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HookQueueStatsEnvelopeResponse"
  /api/hooks/queue/enqueue:
    post:
      summary: Enqueue a hook-backed memory capture item
      operationId: hookQueueEnqueue
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HookQueueEnqueueRequest"
      responses:
        "200":
          description: Enqueued hook queue item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HookEventEnvelopeResponse"
  /api/hooks/queue/pending:
    get:
      summary: Read or claim pending hook queue items
      operationId: hookQueuePending
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            format: uint32
        - in: query
          name: worker_id
          required: false
          schema:
            type: string
        - in: query
          name: visibility_timeout_ms
          required: false
          schema:
            type: integer
            format: uint64
      responses:
        "200":
          description: Pending hook queue items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HookQueuePendingEnvelopeResponse"
  /api/hooks/queue/{id}/complete:
    post:
      summary: Mark a hook queue item complete
      operationId: hookQueueComplete
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: uint64
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HookQueueCompleteRequest"
      responses:
        "200":
          description: Completed hook queue item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HookEventEnvelopeResponse"
        "404":
          description: Queue item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HookEventEnvelopeResponse"
  /api/hooks/queue/{id}/fail:
    post:
      summary: Mark a hook queue item failed
      operationId: hookQueueFail
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: uint64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HookQueueFailRequest"
      responses:
        "200":
          description: Failed hook queue item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HookEventEnvelopeResponse"
        "404":
          description: Queue item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HookEventEnvelopeResponse"
  /api/panorama/summary:
    get:
      summary: Combined panorama summary for code and knowledge views
      operationId: panoramaSummary
      parameters:
        - in: query
          name: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Combined panorama summaries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PanoramaSummaryEnvelopeResponse"
  /api/panorama/query:
    post:
      summary: Execute registered capability packs against a panorama query
      operationId: panoramaQuery
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PanoramaQueryRequest"
      responses:
        "200":
          description: Capability responses for the panorama query
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PanoramaQueryEnvelopeResponse"
  schemas:
    ActorKind:
      type: string
