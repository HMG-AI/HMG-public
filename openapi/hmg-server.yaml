          type: string
        path:
          type: array
          items:
            $ref: "#/components/schemas/ScopeSegment"
    AccessLevel:
      type: string
      enum: [Public, Internal, Restricted]
    EffectiveTimeWindow:
      type: object
      properties:
        starts_at:
          type: string
          format: date-time
        ends_at:
          type: string
          format: date-time
    ObjectRef:
      type: object
      required: [object_type, object_id]
      properties:
        object_type:
          type: string
        object_id:
          type: string
    MemoryReferences:
      type: object
      properties:
        subjects:
          type: array
          items:
            $ref: "#/components/schemas/ObjectRef"
        artifacts:
          type: array
          items:
            $ref: "#/components/schemas/ObjectRef"
        work_items:
          type: array
          items:
            $ref: "#/components/schemas/ObjectRef"
        decisions:
          type: array
          items:
            $ref: "#/components/schemas/ObjectRef"
        commitments:
          type: array
          items:
            $ref: "#/components/schemas/ObjectRef"
        evidence:
          type: array
          items:
            $ref: "#/components/schemas/ObjectRef"
    MemoryReferenceFilters:
      type: object
      properties:
        artifacts:
          type: array
          items:
            $ref: "#/components/schemas/ObjectRef"
        work_items:
          type: array
          items:
            $ref: "#/components/schemas/ObjectRef"
        decisions:
          type: array
          items:
            $ref: "#/components/schemas/ObjectRef"
        evidence:
          type: array
          items:
            $ref: "#/components/schemas/ObjectRef"
    MemoryContext:
      type: object
      properties:
        scope:
          $ref: "#/components/schemas/ScopeRef"
        access_level:
          $ref: "#/components/schemas/AccessLevel"
        policy_tags:
          type: array
          items:
            type: string
        effective_time:
          $ref: "#/components/schemas/EffectiveTimeWindow"
        audit:
          $ref: "#/components/schemas/AuditContext"
        references:
          $ref: "#/components/schemas/MemoryReferences"
        governance:
          $ref: "#/components/schemas/MemoryGovernance"
        lifecycle:
          $ref: "#/components/schemas/AtomLifecycleStats"
    AtomLifecycleStats:
      type: object
      properties:
        recall_hit_count:
          type: integer
          format: uint64
          default: 0
        last_recall_wall_ms:
          type: integer
          format: int64
          default: 0
      description: Optional recall popularity signals attached to MemoryContext (Phase F).
    RetentionPolicy:
      oneOf:
        - type: string
          enum: [KeepIndefinitely]
        - type: object
          required: [RetainUntil]
          properties:
            RetainUntil:
              type: string
              format: date-time
    MemoryGovernance:
      type: object
      properties:
        sensitivity:
          type: array
          items:
            type: string
        legal_basis:
          type: string
        retention_policy:
          $ref: "#/components/schemas/RetentionPolicy"
        break_glass_role:
          type: string
    MemorizeRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
        source:
          type: string
        modality:
          type: string
          default: Text
        domain_pack_id:
          type: string
        context:
          $ref: "#/components/schemas/MemoryContext"
        reference_filters:
          $ref: "#/components/schemas/MemoryReferenceFilters"
        skip_envelope_strip:
          type: boolean
          default: false
        disable_admission:
          type: boolean
          default: false
        disable_redaction:
          type: boolean
          default: false
          description: Skip built-in DLP redaction for trusted, already-sanitized payloads.
    MemorizePreprocessMeta:
      type: object
      required: [envelope_stripped]
      properties:
        envelope_stripped:
          type: boolean
        normalized_line_endings:
          type: boolean
          description: True when CR or CRLF line endings were normalized to LF.
        stripped_role:
          type: string
          nullable: true
          description: Chat/export role removed from the first substantive line, when present.
        redaction_count:
          type: integer
          description: Number of DLP findings replaced with placeholders before extraction and persistence.
        redaction_kinds:
          type: array
          items:
            type: string
          description: Unique categories of secrets redacted during preprocessing.
        detected_format:
          type: string
          nullable: true
          description: Lightweight payload format hint such as chat_transcript, code_diff, markdown, json_like, stack_trace, or shell_log.
        normalized_fingerprint:
          type: string
          description: Stable hex fingerprint of the sanitized, normalized payload.
        deduplicated:
          type: boolean
          description: True when exact normalized extracted facts already existed and no new atoms were written.
        duplicate_of:
          type: string
          nullable: true
          description: First existing atom that matched the normalized extracted fact fingerprint, when deduplicated.
        warnings:
          type: array
          items:
            type: string
          description: Non-sensitive preprocessing warnings such as secret_redacted.
    MemorizeResponse:
      type: object
      required: [added_atoms]
      properties:
        added_atoms:
          type: array
          items:
            type: string
        matched_atoms:
          type: array
          items:
            type: array
            items:
              type: string
        conflicts:
          type: array
          items:
            type: string
        snapshot_version:
          type: integer
          format: uint64
        error:
          type: string
        preprocess:
          allOf:
            - $ref: "#/components/schemas/MemorizePreprocessMeta"
          nullable: true
          description: Present on success after preprocessing; includes envelope stripping, redaction, format, and fingerprint diagnostics.
    MemorizeEnvelopeResponse:
      type: object
      required: [ok, data, error]
      properties:
        ok:
          type: boolean
        data:
          allOf:
            - $ref: "#/components/schemas/MemorizeResponse"
          nullable: true
        error:
          allOf:
            - $ref: "#/components/schemas/ApiError"
          nullable: true
    ApiError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: Stable machine-readable business error code. Current families include auth.*, quota.exceeded, rate_limit.exceeded, lens.*, admission.*, compiler.*, index.*, storage.*, request.invalid, resource.not_found, and governance.failed.
        message:
          type: string
          description: Human-readable error detail.
        details:
          description: Optional structured diagnostics for callers.
          nullable: true
    SecretAccessPolicy:
      type: object
      properties:
        allowed_purposes:
          type: array
          items:
            type: string
        allowed_tools:
          type: array
          items:
            type: string
        requires_approval:
          type: boolean
          default: false
        allow_reveal:
          type: boolean
