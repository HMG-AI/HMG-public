    NoiseFeedbackResponse:
      type: object
      required: [success, noise_prototype_count]
      properties:
        success:
          type: boolean
        noise_prototype_count:
          type: integer
          format: uint64
          description: Total embedding prototypes after registration (includes lazy seed set once recall runs).
    NoiseFeedbackEnvelopeResponse:
      type: object
      required: [ok, data, error]
      properties:
        ok:
          type: boolean
        data:
          allOf:
            - $ref: "#/components/schemas/NoiseFeedbackResponse"
          nullable: true
        error:
          allOf:
            - $ref: "#/components/schemas/ApiError"
          nullable: true
    RecallRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string
        max_results:
          type: integer
          format: uint32
          default: 20
        min_epistemic_rank:
          type: integer
          format: uint8
        include_negated:
          type: boolean
          default: false
        include_archive:
          type: boolean
          default: false
          description: Search archive/cold history beyond the active working set.
        active_window_ms:
          type: integer
          format: int64
          description: Optional active working-set window in milliseconds; defaults to 30 days.
        precision_mode:
          type: boolean
          default: false
          description: Use stricter seed floors and bounded projection for precision-sensitive recall.
        diffusion_depth:
          type: integer
          format: uint32
          default: 2
        temporal_start_ms:
          type: integer
          format: int64
          description: Optional inclusive wall-clock lower bound for recall, as Unix epoch milliseconds.
        temporal_end_ms:
          type: integer
          format: int64
          description: Optional inclusive wall-clock upper bound for recall, as Unix epoch milliseconds.
        domain_pack_id:
          type: string
        recall_view_id:
          type: string
          description: Optional Domain Lens recall view id validated against domain_pack_id and applied to normal recall responses.
        context:
          $ref: "#/components/schemas/MemoryContext"
        include_recall_trace:
          type: boolean
          default: false
          description: When true, the response includes recall_pipeline_trace with hybrid-retrieval seed diagnostics.
          type: boolean
          default: false
          type: boolean
          default: false
          type: boolean
          default: false
          type: boolean
          default: false
        max_seeds:
          type: integer
          format: uint32
          default: 50
          description: Maximum seed atoms admitted into projection diffusion; 0 explicitly means unbounded projection behavior.
        max_visited:
          type: integer
          format: uint32
          default: 10000
          description: Maximum graph nodes visited during projection diffusion; 0 explicitly means unbounded projection behavior.
        min_seed_score:
          type: number
          format: double
          default: 0.0
          description: Minimum seed score admitted into projection diffusion.
        absolute_min_relevance_score:
          type: number
          format: double
          default: 0.0
          description: Absolute floor for seed-stage relevance threshold before projection.
        decay_half_life_secs:
          type: number
          format: double
          description: Optional temporal decay half-life for graph projection, in seconds.
        disable_lifecycle_ranking:
          type: boolean
          default: false
          description: When true, disable lifecycle access/recency multiplier during projection ranking.
    RecallViewRequest:
      allOf:
        - $ref: "#/components/schemas/RecallRequest"
        - type: object
          properties:
            mode:
              type: string
              enum: [normal, governance, audit]
              default: normal
            view_id:
              type: string
              description: Optional Domain Lens recall view id, validated against domain_pack_id before core recall.
            view:
              type: string
              description: Backward-compatible alias for view_id.
    RecalledAtom:
      type: object
      required: [id, score, epistemic_rank, is_conditional, exposure_state]
      properties:
        id:
          type: string
        text:
          type: string
        score:
          type: number
          format: double
        epistemic_rank:
          type: integer
          format: uint8
        is_conditional:
          type: boolean
        exposure_state:
          type: string
          enum: [Normal, Quarantined, Sealed, Tombstoned]
    RecallPipelineCandidate:
      type: object
      required:
        - atom_id
        - fused_score
        - rerank_multiplier
        - rerank_score
        - passed_relevance_threshold
      properties:
        atom_id:
          type: string
        vector_rank:
          type: integer
          format: uint64
          nullable: true
        keyword_rank:
          type: integer
          format: uint64
          nullable: true
        fused_score:
          type: number
          format: double
        rerank_multiplier:
          type: number
          format: double
        rerank_score:
          type: number
          format: double
        passed_relevance_threshold:
          type: boolean
    RecallPipelineTrace:
      type: object
      required: [query, candidates]
      properties:
        query:
          type: string
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/RecallPipelineCandidate"
    RecallResponse:
      type: object
      required: [narrative, atoms, knowledge_gaps, candidates_considered]
      properties:
        narrative:
          type: string
        atoms:
          type: array
          items:
            $ref: "#/components/schemas/RecalledAtom"
        knowledge_gaps:
          type: array
          items:
            type: string
        candidates_considered:
          type: integer
          format: uint64
        recall_pipeline_trace:
          allOf:
            - $ref: "#/components/schemas/RecallPipelineTrace"
          nullable: true
          description: Present when include_recall_trace was true on the request; covers seed-stage retrieval only (before graph projection).
        adaptive_skip_reason:
          type: string
          nullable: true
          description: When set, expensive hybrid retrieval was skipped (e.g. trivial_phrase, empty_query). Omitted on full recall.
          type: boolean
          default: false
          description: When true, dense semantic retrieval was skipped because the query embedding matched noise prototypes (Phase E).
        view:
          allOf:
            - $ref: "#/components/schemas/RecallViewProjection"
          nullable: true
          description: Lens-specific recall view compiled over already authorized recall results.
        metadata:
          $ref: "#/components/schemas/RecallPolicyFilterMetadata"
        error:
          type: string
    RecallViewSection:
      type: object
      required: [title, summary, atom_ids]
      properties:
        title:
          type: string
        summary:
          type: string
        atom_ids:
          type: array
          items:
            type: string
            format: ulid
    RecallViewProjection:
      type: object
      required: [view_id, domain_pack_id, sections]
      properties:
        view_id:
          type: string
        domain_pack_id:
          type: string
        sections:
          type: array
          items:
            $ref: "#/components/schemas/RecallViewSection"
        applied_rules:
          type: array
          items:
            type: string
          description: Deterministic view compiler rules applied without additional retrieval.
    RecallEnvelopeResponse:
      type: object
      required: [ok, data, error]
      properties:
        ok:
          type: boolean
        data:
          allOf:
            - $ref: "#/components/schemas/RecallResponse"
          nullable: true
        error:
          allOf:
            - $ref: "#/components/schemas/ApiError"
          nullable: true
    RecallViewEnvelopeResponse:
      type: object
      required: [ok, data, error]
      properties:
        ok:
          type: boolean
        data:
          allOf:
            - $ref: "#/components/schemas/RecallResponse"
          nullable: true
          description: Recall response plus recall_view metadata fields such as mode and view_id.
        error:
          allOf:
            - $ref: "#/components/schemas/ApiError"
          nullable: true
    RecallPolicyFilterMetadata:
      type: object
      required:
        - matched_before_policy
        - filtered_by_policy
        - provided_policy_tags
        - required_policy_tags
      properties:
        matched_before_policy:
          type: integer
          format: uint64
          description: Number of atoms matched before request policy and role filtering.
        filtered_by_policy:
          type: integer
          format: uint64
          description: Number of otherwise matching atoms hidden by policy, tenant, or role context.
        provided_policy_tags:
          type: array
          items:
            type: string
          description: Policy tags supplied through x-hmg-policy-tags.
        required_policy_tags:
          type: array
          items:
            type: string
          description: Policy tags observed on hidden matches, when available.
        explanation:
          type: string
          nullable: true
          description: Human-readable explanation when matching memories were hidden by policy context.
    CorrectRequest:
      type: object
      required: [target_atom, action, reason]
      properties:
        target_atom:
          type: string
        action:
          type: string
          enum: [negate, confirm_actual, confirm_necessary, demote, replace]
        reason:
          type: string
        new_content:
          type: string
        domain_pack_id:
          type: string
        context:
          $ref: "#/components/schemas/MemoryContext"
    CorrectResponse:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
        message:
          type: string
        replacement_atom:
          type: string
    CorrectEnvelopeResponse:
      type: object
      required: [ok, data, error]
      properties:
        ok:
          type: boolean
        data:
          allOf:
            - $ref: "#/components/schemas/CorrectResponse"
          nullable: true
        error:
          allOf:
            - $ref: "#/components/schemas/ApiError"
          nullable: true
    Contradiction:
      type: object
