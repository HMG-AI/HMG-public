openapi: 3.1.0
info:
  title: HMG Server API
  version: 0.9.2
  description: >
    Public HTTP contract for HMG agent memory operations.
    This is the Community Edition surface — memorize, recall, correct,
    govern, stats, snapshots, audit, and graph export.
    Advanced endpoints (observation, vault, hooks, panorama, noise feedback)
    are available in Developer and Enterprise editions.
servers:
  - url: http://localhost:3000
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
  parameters:
    TenantHeader:
      in: header
      name: x-hmg-tenant-id
      required: false
      schema:
        type: string
      description: Injects a tenant scope when the request body does not provide one.
    ActorIdHeader:
      in: header
      name: x-hmg-actor-id
      required: false
      schema:
        type: string
      description: Request actor identifier used for audit context injection.
    ActorKindHeader:
      in: header
      name: x-hmg-actor-kind
      required: false
      schema:
        type: string
        enum: [User, Agent, Service, user, agent, service]
      description: Request actor kind used for audit context injection.
    TraceIdHeader:
      in: header
      name: x-trace-id
      required: false
      schema:
        type: string
      description: Optional trace identifier propagated into request audit context.
    RoleHeader:
      in: header
      name: x-hmg-role
      required: false
      schema:
        type: string
        enum: [viewer, editor, governor, admin]
      description: Service-layer access role used for policy gating.
    PolicyTagsHeader:
      in: header
      name: x-hmg-policy-tags
      required: false
      schema:
        type: string
      description: Comma-separated policy tags granting read access to tagged records.
paths:
  /api/stats:
    get:
      summary: Read engine statistics
      operationId: getStats
      responses:
        "200":
          description: Current engine statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsEnvelopeResponse"
  /api/memorize:
    post:
      summary: Memorize new information
      operationId: memorize
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/ActorIdHeader"
        - $ref: "#/components/parameters/ActorKindHeader"
        - $ref: "#/components/parameters/TraceIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemorizeRequest"
      responses:
        "200":
          description: Memory written
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemorizeEnvelopeResponse"
  /api/recall:
    post:
      summary: Recall relevant memories
      operationId: recall
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/ActorIdHeader"
        - $ref: "#/components/parameters/ActorKindHeader"
        - $ref: "#/components/parameters/TraceIdHeader"
        - $ref: "#/components/parameters/RoleHeader"
        - $ref: "#/components/parameters/PolicyTagsHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecallRequest"
      responses:
        "200":
          description: Recalled memories
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecallEnvelopeResponse"
  /api/recall_view:
    post:
      summary: Recall memories through normal, governance, or audit view
      operationId: recallView
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/ActorIdHeader"
        - $ref: "#/components/parameters/ActorKindHeader"
        - $ref: "#/components/parameters/TraceIdHeader"
        - $ref: "#/components/parameters/RoleHeader"
        - $ref: "#/components/parameters/PolicyTagsHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecallViewRequest"
      responses:
        "200":
          description: Recalled memories using a governance-aware view
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecallViewEnvelopeResponse"
  /api/correct:
    post:
      summary: Correct an existing memory
      operationId: correct
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/ActorIdHeader"
        - $ref: "#/components/parameters/ActorKindHeader"
        - $ref: "#/components/parameters/TraceIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CorrectRequest"
      responses:
        "200":
          description: Correction result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CorrectEnvelopeResponse"
  /api/verify:
    post:
      summary: Verify graph consistency
      operationId: verify
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
      responses:
        "200":
          description: Verification report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationEnvelopeResponse"
  /api/snapshot:
    post:
      summary: Create an explicit snapshot
      operationId: createSnapshot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SnapshotRequest"
      responses:
        "200":
          description: Snapshot created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnapshotEnvelopeResponse"
  /api/snapshots/{version}:
    get:
      summary: Read one snapshot delta
      operationId: getSnapshot
      parameters:
        - in: path
          name: version
          required: true
          schema:
            type: integer
            format: uint64
      responses:
        "200":
          description: Snapshot delta
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnapshotDeltaEnvelopeResponse"
        "404":
          description: Snapshot version not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnapshotDeltaEnvelopeResponse"
  /api/replay:
    get:
      summary: Replay snapshot deltas across a version range
      operationId: replay
      parameters:
        - in: query
          name: from_version
          required: true
          schema:
            type: integer
            format: uint64
        - in: query
          name: to_version
          required: true
          schema:
            type: integer
            format: uint64
      responses:
        "200":
          description: Snapshot replay for the requested range
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReplayEnvelopeResponse"
  /api/governance/quarantine:
    post:
      summary: Quarantine an atom from normal recall
      operationId: quarantineAtom
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/ActorIdHeader"
        - $ref: "#/components/parameters/ActorKindHeader"
        - $ref: "#/components/parameters/TraceIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GovernanceRequest"
      responses:
        "200":
          description: Atom quarantined
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceEnvelopeResponse"
  /api/governance/seal:
    post:
      summary: Seal an atom and optionally derive a lesson atom
      operationId: sealAtom
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/ActorIdHeader"
        - $ref: "#/components/parameters/ActorKindHeader"
        - $ref: "#/components/parameters/TraceIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GovernanceRequest"
      responses:
        "200":
          description: Atom sealed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceEnvelopeResponse"
  /api/governance/tombstone:
    post:
      summary: Tombstone an atom and optionally destroy payload recovery
      operationId: tombstoneAtom
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/ActorIdHeader"
        - $ref: "#/components/parameters/ActorKindHeader"
        - $ref: "#/components/parameters/TraceIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GovernanceRequest"
      responses:
        "200":
          description: Atom tombstoned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceEnvelopeResponse"
  /api/governance/derive_lesson:
    post:
      summary: Derive a sanitized lesson atom from an existing atom
      operationId: deriveLesson
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/ActorIdHeader"
        - $ref: "#/components/parameters/ActorKindHeader"
        - $ref: "#/components/parameters/TraceIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GovernanceRequest"
      responses:
        "200":
          description: Lesson atom derived
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceEnvelopeResponse"
  /api/audit/access:
    get:
      summary: Read recent access audit traces
      operationId: auditAccess
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/ActorIdHeader"
        - $ref: "#/components/parameters/ActorKindHeader"
        - $ref: "#/components/parameters/TraceIdHeader"
        - $ref: "#/components/parameters/RoleHeader"
      responses:
        "200":
          description: Recent access traces
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessTraceListEnvelopeResponse"
  /api/audit/verify:
    get:
      summary: Verify the access audit trace hash chain
      operationId: auditVerify
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/ActorIdHeader"
        - $ref: "#/components/parameters/ActorKindHeader"
        - $ref: "#/components/parameters/TraceIdHeader"
        - $ref: "#/components/parameters/RoleHeader"
      responses:
        "200":
          description: Audit hash chain verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessTraceVerificationEnvelopeResponse"
  /api/usage/report:
    get:
      summary: Read aggregated usage metering report
      operationId: usageReport
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/ActorIdHeader"
        - $ref: "#/components/parameters/ActorKindHeader"
        - $ref: "#/components/parameters/TraceIdHeader"
        - $ref: "#/components/parameters/RoleHeader"
        - in: query
          name: tenant_id
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Aggregated usage report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageReportEnvelopeResponse"
  /api/graph/export:
    get:
      summary: Export readable graph as visualization-friendly JSON
      operationId: graphExport
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/ActorIdHeader"
        - $ref: "#/components/parameters/ActorKindHeader"
        - $ref: "#/components/parameters/TraceIdHeader"
        - $ref: "#/components/parameters/RoleHeader"
        - $ref: "#/components/parameters/PolicyTagsHeader"
      responses:
        "200":
          description: Readable graph export
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphExportEnvelopeResponse"
  /api/atom/{id}:
    get:
      summary: Read one atom
      operationId: getAtom
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Atom
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AtomEnvelopeResponse"
        "400":
          description: Invalid atom id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AtomEnvelopeResponse"
        "403":
          description: Atom not readable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AtomEnvelopeResponse"
        "404":
          description: Atom not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AtomEnvelopeResponse"
  /api/atom/{id}/history:
    get:
      summary: Read one atom with state history
      operationId: getAtomHistory
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Atom history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AtomHistoryEnvelopeResponse"
        "400":
          description: Invalid atom id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AtomHistoryEnvelopeResponse"
        "403":
          description: Atom history not readable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AtomHistoryEnvelopeResponse"
        "404":
          description: Atom not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AtomHistoryEnvelopeResponse"
  schemas:
    ActorKind:
      type: string
      enum: [User, Agent, Service]
    ActorPrincipal:
      type: object
      required: [kind, id]
      properties:
        kind:
          $ref: "#/components/schemas/ActorKind"
        id:
          type: string
    AuditContext:
      type: object
      required: [actor, operation]
      properties:
        actor:
          $ref: "#/components/schemas/ActorPrincipal"
        operation:
          type: string
        trace_id:
          type: string
        reason:
          type: string
    ScopeSegment:
      type: object
      required: [kind, id]
      properties:
        kind:
          type: string
        id:
          type: string
    ScopeRef:
      type: object
      required: [tenant_id, path]
      properties:
        tenant_id:
          type: string
        path:
          type: array
          items:
            $ref: "#/components/schemas/ScopeSegment"
    AccessLevel:
      type: string
      enum: [Public, Internal, Restricted]
    EffectiveTimeWindow:
      type: object
      properties:
        starts_at:
          type: string
          format: date-time
        ends_at:
          type: string
          format: date-time
    ObjectRef:
      type: object
      required: [object_type, object_id]
      properties:
        object_type:
          type: string
        object_id:
          type: string
    MemoryReferences:
      type: object
      properties:
        subjects:
          type: array
          items:
            $ref: "#/components/schemas/ObjectRef"
        artifacts:
          type: array
          items:
            $ref: "#/components/schemas/ObjectRef"
        work_items:
          type: array
          items:
            $ref: "#/components/schemas/ObjectRef"
        decisions:
          type: array
          items:
            $ref: "#/components/schemas/ObjectRef"
        commitments:
          type: array
          items:
            $ref: "#/components/schemas/ObjectRef"
        evidence:
          type: array
          items:
            $ref: "#/components/schemas/ObjectRef"
    MemoryReferenceFilters:
      type: object
      properties:
        artifacts:
          type: array
          items:
            $ref: "#/components/schemas/ObjectRef"
        work_items:
          type: array
          items:
            $ref: "#/components/schemas/ObjectRef"
        decisions:
          type: array
          items:
            $ref: "#/components/schemas/ObjectRef"
        evidence:
          type: array
          items:
            $ref: "#/components/schemas/ObjectRef"
    MemoryContext:
      type: object
      properties:
        scope:
          $ref: "#/components/schemas/ScopeRef"
        access_level:
          $ref: "#/components/schemas/AccessLevel"
        policy_tags:
          type: array
          items:
            type: string
        effective_time:
          $ref: "#/components/schemas/EffectiveTimeWindow"
        audit:
          $ref: "#/components/schemas/AuditContext"
        references:
          $ref: "#/components/schemas/MemoryReferences"
        governance:
          $ref: "#/components/schemas/MemoryGovernance"
    RetentionPolicy:
      oneOf:
        - type: string
          enum: [KeepIndefinitely]
        - type: object
          required: [RetainUntil]
          properties:
            RetainUntil:
              type: string
              format: date-time
    MemoryGovernance:
      type: object
      properties:
        sensitivity:
          type: array
          items:
            type: string
        legal_basis:
          type: string
        retention_policy:
          $ref: "#/components/schemas/RetentionPolicy"
        break_glass_role:
          type: string
    MemorizeRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
        source:
          type: string
        modality:
          type: string
          default: Text
        domain_pack_id:
          type: string
        context:
          $ref: "#/components/schemas/MemoryContext"
    MemorizeResponse:
      type: object
      required: [added_atoms]
      properties:
        added_atoms:
          type: array
          items:
            type: string
        snapshot_version:
          type: integer
          format: uint64
        error:
          type: string
    MemorizeEnvelopeResponse:
      type: object
      required: [ok, data, error]
      properties:
        ok:
          type: boolean
        data:
          allOf:
            - $ref: "#/components/schemas/MemorizeResponse"
          nullable: true
        error:
          allOf:
            - $ref: "#/components/schemas/ApiError"
          nullable: true
    ApiError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: Stable machine-readable error code.
        message:
          type: string
          description: Human-readable error detail.
        details:
          description: Optional structured diagnostics for callers.
          nullable: true
    RecallRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string
        max_results:
          type: integer
          format: uint32
          default: 20
        include_negated:
          type: boolean
          default: false
        domain_pack_id:
          type: string
        context:
          $ref: "#/components/schemas/MemoryContext"
    RecallViewRequest:
      allOf:
        - $ref: "#/components/schemas/RecallRequest"
        - type: object
          properties:
            mode:
              type: string
              enum: [normal, governance, audit]
              default: normal
    RecalledAtom:
      type: object
      required: [id]
      properties:
        id:
          type: string
        text:
          type: string
        score:
          type: number
          format: double
        epistemic_rank:
          type: integer
          format: uint8
        is_conditional:
          type: boolean
        exposure_state:
          type: string
          enum: [Normal, Quarantined, Sealed, Tombstoned]
    RecallResponse:
      type: object
      required: [narrative, atoms, knowledge_gaps, candidates_considered]
      properties:
        narrative:
          type: string
        atoms:
          type: array
          items:
            $ref: "#/components/schemas/RecalledAtom"
        knowledge_gaps:
          type: array
          items:
            type: string
        candidates_considered:
          type: integer
          format: uint64
        metadata:
          $ref: "#/components/schemas/RecallPolicyFilterMetadata"
        error:
          type: string
    RecallEnvelopeResponse:
      type: object
      required: [ok, data, error]
      properties:
        ok:
          type: boolean
        data:
          allOf:
            - $ref: "#/components/schemas/RecallResponse"
          nullable: true
        error:
          allOf:
            - $ref: "#/components/schemas/ApiError"
          nullable: true
    RecallViewEnvelopeResponse:
      type: object
      required: [ok, data, error]
      properties:
        ok:
          type: boolean
        data:
          allOf:
            - $ref: "#/components/schemas/RecallResponse"
          nullable: true
        error:
          allOf:
            - $ref: "#/components/schemas/ApiError"
          nullable: true
    RecallPolicyFilterMetadata:
      type: object
      required:
        - matched_before_policy
        - filtered_by_policy
      properties:
        matched_before_policy:
          type: integer
          format: uint64
          description: Number of atoms matched before policy filtering.
        filtered_by_policy:
          type: integer
          format: uint64
          description: Number of otherwise matching atoms hidden by policy.
    CorrectRequest:
      type: object
      required: [target_atom, action, reason]
      properties:
        target_atom:
          type: string
        action:
          type: string
          enum: [negate, confirm_actual, confirm_necessary, demote, replace]
        reason:
          type: string
        new_content:
          type: string
        domain_pack_id:
          type: string
        context:
          $ref: "#/components/schemas/MemoryContext"
    CorrectResponse:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
        message:
          type: string
        replacement_atom:
          type: string
    CorrectEnvelopeResponse:
      type: object
      required: [ok, data, error]
      properties:
        ok:
          type: boolean
        data:
          allOf:
            - $ref: "#/components/schemas/CorrectResponse"
          nullable: true
        error:
          allOf:
            - $ref: "#/components/schemas/ApiError"
          nullable: true
    Contradiction:
      type: object
      required: [atom_a, atom_b, description, resolved]
      properties:
        atom_a:
          type: string
        atom_b:
          type: string
        description:
          type: string
        resolved:
          type: boolean
    VerificationResponse:
      type: object
      required:
        - is_consistent
        - orphaned_atoms
        - contradictions
        - causal_cycles
        - total_atoms
        - total_edges
      properties:
        is_consistent:
          type: boolean
        orphaned_atoms:
          type: array
          items:
            type: string
        contradictions:
          type: array
          items:
            $ref: "#/components/schemas/Contradiction"
        causal_cycles:
          type: array
          items:
            type: array
            items:
              type: string
        total_atoms:
          type: integer
          format: uint64
        total_edges:
          type: integer
          format: uint64
    VerificationEnvelopeResponse:
      type: object
      required: [ok, data, error]
      properties:
        ok:
          type: boolean
        data:
          allOf:
            - $ref: "#/components/schemas/VerificationResponse"
          nullable: true
        error:
          allOf:
            - $ref: "#/components/schemas/ApiError"
          nullable: true
    SnapshotRequest:
      type: object
      properties:
        reason:
          type: string
    SnapshotResponse:
      type: object
      required: [version, trigger, reason]
      properties:
        version:
          type: integer
          format: uint64
        trigger:
          type: string
        reason:
          type: string
    SnapshotEnvelopeResponse:
      type: object
      required: [ok, data, error]
      properties:
        ok:
          type: boolean
        data:
          allOf:
            - $ref: "#/components/schemas/SnapshotResponse"
          nullable: true
        error:
          allOf:
            - $ref: "#/components/schemas/ApiError"
          nullable: true
    GovernanceRequest:
      type: object
      required: [target_atom, reason]
      properties:
        target_atom:
          type: string
        reason:
          type: string
        actor:
          type: string
        lesson_content:
          type: string
        destroy_payload:
          type: boolean
    GovernanceResponse:
      type: object
      required: [success, message, target_atom]
      properties:
        success:
          type: boolean
        message:
          type: string
        target_atom:
          type: string
        lesson_atom:
          type: string
        snapshot_version:
          type: integer
          format: uint64
        exposure:
          type: string
          enum: [Normal, Quarantined, Sealed, Tombstoned]
    GovernanceEnvelopeResponse:
      type: object
      required: [ok, data, error]
      properties:
        ok:
          type: boolean
        data:
          allOf:
            - $ref: "#/components/schemas/GovernanceResponse"
          nullable: true
        error:
          allOf:
            - $ref: "#/components/schemas/ApiError"
          nullable: true
    SnapshotDelta:
      type: object
      required:
        - version
        - timestamp
        - trigger
        - added_atoms
        - added_edges
        - modified_atoms
        - modified_edges
      properties:
        version:
          type: integer
          format: uint64
        timestamp:
          type: object
        trigger:
          type: string
        added_atoms:
          type: array
          items:
