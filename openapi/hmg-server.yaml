        id:
          type: string
    AuditContext:
      type: object
      required: [actor, operation]
      properties:
        actor:
          $ref: "#/components/schemas/ActorPrincipal"
        operation:
          type: string
        trace_id:
          type: string
        reason:
          type: string
    ScopeSegment:
      type: object
      required: [kind, id]
      properties:
        kind:
